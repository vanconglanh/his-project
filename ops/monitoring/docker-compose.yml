version: "3.9"

# Monitoring stack: Loki + Promtail + Grafana + cAdvisor + node-exporter + Alertmanager
# Chạy: docker compose -f ops/monitoring/docker-compose.yml up -d
# Grafana UI: http://localhost:3100  (user: admin / pass: xem GF_SECURITY_ADMIN_PASSWORD)

networks:
  monitoring:
    driver: bridge
  # Kết nối vào network của app chính để scrape metrics
  prodiab_default:
    external: true

volumes:
  loki_data:
  grafana_data:
  alertmanager_data:

services:
  # --------------------------------------------------------------------------
  # Loki — log aggregation backend
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: prodiab_loki
    restart: unless-stopped
    ports:
      - "3200:3100"
    volumes:
      - loki_data:/loki
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Promtail — log shipper (scrape Docker container logs)
  # --------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.4
    container_name: prodiab_promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/docker.sock:/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring
      - prodiab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Grafana — dashboard và alerting UI
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: prodiab_grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-Grafana@ProDiab2026!}"
      GF_SERVER_ROOT_URL: "${GF_ROOT_URL:-http://localhost:3100}"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_SMTP_ENABLED: "${GF_SMTP_ENABLED:-false}"
      GF_SMTP_HOST: "${GF_SMTP_HOST:-smtp.gmail.com:587}"
      GF_SMTP_USER: "${GF_SMTP_USER:-}"
      GF_SMTP_PASSWORD: "${GF_SMTP_PASSWORD:-}"
      GF_SMTP_FROM_ADDRESS: "${GF_SMTP_FROM:-prodiab-alert@example.com}"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Alertmanager — routing alert → Slack / email / PagerDuty
  # --------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: prodiab_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager-config.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # cAdvisor — container resource metrics (CPU, RAM, net, disk per container)
  # --------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: prodiab_cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # node-exporter — host OS metrics (CPU, RAM, disk, network)
  # --------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: prodiab_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
