global:
  # Thời gian chờ resolve nếu không nhận được thêm alert
  resolve_timeout: 5m
  # SMTP (cấu hình qua env nếu cần)
  smtp_smarthost: "${SMTP_HOST:-smtp.gmail.com:587}"
  smtp_from: "${SMTP_FROM:-prodiab-alert@example.com}"
  smtp_auth_username: "${SMTP_USER:-}"
  smtp_auth_password: "${SMTP_PASSWORD:-}"
  smtp_require_tls: true

# Templates tùy chỉnh
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ---------------------------------------------------------------------------
# Route — phân loại và định tuyến alert
# ---------------------------------------------------------------------------
route:
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default-slack

  routes:
    # P1 Critical — notify ngay lập tức, không giảm tần suất
    - match:
        severity: critical
      receiver: pagerduty-critical
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Database down → alert riêng
    - match:
        alertname: MySQLDown
      receiver: db-alert
      group_wait: 10s
      repeat_interval: 30m

    # Security alerts
    - match:
        category: security
      receiver: security-team
      group_wait: 0s
      repeat_interval: 2h

    # Disk space warning
    - match:
        alertname: DiskSpaceHigh
      receiver: ops-email
      repeat_interval: 6h

# ---------------------------------------------------------------------------
# Inhibition rules — tránh alert cascade
# ---------------------------------------------------------------------------
inhibit_rules:
  # Nếu service down thì inhibit các alert khác của service đó
  - source_match:
      alertname: ServiceDown
    target_match_re:
      alertname: "High.*|.*Error.*|.*Latency.*"
    equal: ["service"]

  # Nếu MySQL down thì inhibit slow query alerts
  - source_match:
      alertname: MySQLDown
    target_match:
      alertname: MySQLSlowQuery
    equal: []

# ---------------------------------------------------------------------------
# Receivers
# ---------------------------------------------------------------------------
receivers:
  # Slack channel chính (#ops-alerts)
  - name: default-slack
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/CHANGE_ME}"
        channel: "#ops-alerts"
        username: "ProDiab AlertManager"
        icon_emoji: ":rotating_light:"
        send_resolved: true
        title: |-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }} :fire:{{ else }} :white_check_mark:{{ end }}] {{ .GroupLabels.alertname }}
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}

  # PagerDuty cho critical P1
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_INTEGRATION_KEY:-CHANGE_ME}"
        description: "{{ .GroupLabels.alertname }} — {{ .CommonAnnotations.summary }}"
        severity: critical
        client: "ProDiab AlertManager"
        details:
          firing: "{{ .Alerts.Firing | len }}"
          service: "{{ .GroupLabels.service }}"

  # Email riêng cho database
  - name: db-alert
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/CHANGE_ME}"
        channel: "#ops-database"
        username: "ProDiab DB Alert"
        icon_emoji: ":database:"
        send_resolved: true
        title: "[DB ALERT] {{ .GroupLabels.alertname }}"
        text: |-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
    email_configs:
      - to: "${OPS_EMAIL:-devops@example.com}"
        send_resolved: true
        subject: "[ProDiab DB] {{ .GroupLabels.alertname }}"
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Started: {{ .StartsAt }}
          {{ end }}

  # Security team
  - name: security-team
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_SECURITY:-https://hooks.slack.com/services/CHANGE_ME}"
        channel: "#security-alerts"
        username: "ProDiab Security"
        icon_emoji: ":lock:"
        send_resolved: false
        title: ":rotating_light: SECURITY ALERT: {{ .GroupLabels.alertname }}"
        text: |-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  # Ops email cho cảnh báo disk
  - name: ops-email
    email_configs:
      - to: "${OPS_EMAIL:-devops@example.com}"
        send_resolved: true
        subject: "[ProDiab Ops] {{ .GroupLabels.alertname }}"
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Labels: {{ .Labels }}
          {{ end }}

# ---------------------------------------------------------------------------
# Alert rules — định nghĩa các ngưỡng cảnh báo
# (thường đặt trong Prometheus rules, nhưng Loki cũng hỗ trợ ruler)
# Tham khảo: ops/monitoring/loki-rules/ (tạo thêm nếu dùng Loki ruler)
# ---------------------------------------------------------------------------
# Các alert quan trọng cần có:
#
# 1. HTTP5xxRateHigh
#    condition: error_rate > 1% trong 5 phút
#    severity: critical
#
# 2. APILatencyHigh
#    condition: p95 latency > 1000ms trong 5 phút
#    severity: warning
#
# 3. MySQLDown
#    condition: không nhận được log từ MySQL trong 5 phút
#    severity: critical
#
# 4. DiskSpaceHigh
#    condition: disk usage > 80%
#    severity: warning; > 90% → critical
#
# 5. BackupFailed
#    condition: không có backup file mới hơn 25 giờ
#    severity: critical
#
# 6. ContainerDown
#    condition: container prodiab_backend/frontend/nginx restart > 3 lần/giờ
#    severity: warning
