# =====================================================
# Pro-Diab HIS — Docker Compose DEV
# Chay: cd ops && cp .env.example .env && docker compose up -d
# =====================================================

name: prodiab-dev

services:
  # ---------------------------------------------------
  # MySQL 8.0.36 — database chinh
  # ---------------------------------------------------
  mysql:
    image: mysql:8.0.36
    container_name: prodiab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_dev}
      MYSQL_DATABASE: ${DB_NAME:-prodiab_his}
      MYSQL_USER: ${DB_USER:-prodiab}
      MYSQL_PASSWORD: ${DB_PASSWORD:-prodiab_dev_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/prodiab.cnf:ro
      - ./mysql/init.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - prodiab-net

  # ---------------------------------------------------
  # Redis 7.4 — session, rate-limit, background job
  # ---------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: prodiab-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfilename appendonly.aof
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - prodiab-net

  # ---------------------------------------------------
  # MinIO — luu tru file CLS, anh, PDF don thuoc
  # S3 API: :9000 | Console: :9001
  # ---------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: prodiab-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_2026}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - prodiab-net

  # ---------------------------------------------------
  # Adminer — quan ly MySQL qua browser :8080
  # ---------------------------------------------------
  adminer:
    image: adminer:4.8.1
    container_name: prodiab-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - prodiab-net

  # ---------------------------------------------------
  # MailHog — SMTP dev, UI :8025, SMTP :1025
  # ---------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: prodiab-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - prodiab-net

  # ---------------------------------------------------
  # Migrator — one-shot: apply dump + migrations
  # Chay xong tu exit (restart: on-failure de retry neu mysql chua san)
  # ---------------------------------------------------
  migrator:
    image: mysql:8.0.36
    container_name: prodiab-migrator
    restart: on-failure
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASSWORD:-root_dev}
      DB_NAME: ${DB_NAME:-prodiab_his}
    volumes:
      - ../db:/db:ro
      - ./scripts/apply-migrations.sh:/apply-migrations.sh:ro
    command: bash /apply-migrations.sh
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - prodiab-net

# ---------------------------------------------------
# Volumes
# ---------------------------------------------------
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

# ---------------------------------------------------
# Networks
# ---------------------------------------------------
networks:
  prodiab-net:
    driver: bridge
    name: prodiab-net
