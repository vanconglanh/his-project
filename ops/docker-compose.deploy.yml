# =====================================================================
# Pro-Diab HIS — Docker Compose DEPLOY (self-build, coexist with other stacks)
# Chay song song vienankids/hr tren cung VM: KHONG dung port 80/443.
# Nginx noi bo publish 127.0.0.1:8090 -> nginx host (vienankids) proxy
# subdomain his.diab.com.vn vao day.
# Deploy: docker compose -f ops/docker-compose.deploy.yml --env-file ops/.env up -d --build
# =====================================================================
name: prodiab-his

services:
  mysql:
    image: mysql:8.0.36
    container_name: prodiab-his-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks: [prodiab-his-net]

  redis:
    image: redis:7.4-alpine
    container_name: prodiab-his-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    networks: [prodiab-his-net]

  minio:
    image: minio/minio:latest
    container_name: prodiab-his-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [prodiab-his-net]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: prodiab-his-backend:latest
    container_name: prodiab-his-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};CharSet=utf8mb4;GuidFormat=None;SslMode=None;AllowPublicKeyRetrieval=true;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=False,abortConnect=False"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSSL: "false"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__AccessTokenExpiryMinutes: "60"
      Jwt__RefreshTokenExpiryDays: "7"
      CorsHardening__AllowedOrigins__0: ${APP_PUBLIC_URL}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [prodiab-his-net]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${APP_PUBLIC_URL}
    image: prodiab-his-frontend:latest
    container_name: prodiab-his-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks: [prodiab-his-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: prodiab-his-nginx
    restart: unless-stopped
    ports:
      # Bind docker0 gateway (172.17.0.1) — nginx host (vienankids) proxy qua
      # host.docker.internal:8090. KHONG dung chung docker network voi stack khac
      # vi service name generic (frontend/backend) se dung ten -> DNS collision.
      - "172.17.0.1:8090:80"
    volumes:
      - ./nginx/deploy-prodiab.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks: [prodiab-his-net]

networks:
  prodiab-his-net:
    driver: bridge
    name: prodiab-his-net

volumes:
  mysql-data:
  redis-data:
  minio-data:
