# Nginx nội bộ của stack Pro-Diab (trong compose deploy).
# Gộp frontend + backend sau 1 cổng (container :80 -> host 127.0.0.1:8090).
# Nginx host (vienankids) proxy his.diab.com.vn -> 127.0.0.1:8090.
upstream prodiab_frontend { server frontend:3000; }
upstream prodiab_backend  { server backend:5000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # API -> backend .NET (giữ nguyên /api/... vì controller route /api/v1/*)
    location /api/ {
        proxy_pass http://prodiab_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Hangfire dashboard / healthz (nếu có) cũng về backend
    location /healthz { proxy_pass http://prodiab_backend; }

    # Còn lại -> frontend Next.js
    location / {
        proxy_pass http://prodiab_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
