# =====================================================
# Pro-Diab HIS — Nginx main config
# =====================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/fhir+json
        image/svg+xml;

    # --- Rate limiting zones ---
    # 100 req/phut/user (key = JWT sub, fallback = IP)
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=100r/m;
    # 1000 req/phut/tenant (key = X-Tenant-ID header, fallback = IP)
    limit_req_zone $http_x_tenant_id zone=per_tenant:10m rate=1000r/m;

    # --- Buffer sizes ---
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # --- Include virtual hosts ---
    include /etc/nginx/conf.d/*.conf;
}
