# =====================================================================
# Pro-Diab HIS — Nginx Virtual Host (PRODUCTION hardened)
# Thay the *.prodiab.example.com bang domain thuc
# SSL cert tu Let's Encrypt (certbot)
# Sprint 12 EPIC 10: rate limit, bad bot blocking, strict timeouts
# =====================================================================

# -----------------------------------------------------------------------
# Ẩn phiên bản Nginx — tránh lộ thông tin cho attacker
# -----------------------------------------------------------------------
server_tokens off;
more_clear_headers Server;              # cần ngx_headers_more module
# Nếu không có module more_headers, dùng: server_tokens off; là đủ

# -----------------------------------------------------------------------
# Rate limit zones — định nghĩa ở http context (file này include bởi nginx.conf)
# Nếu đây là file conf.d thì các limit_req_zone cần đặt trong nginx.conf
# hoặc bọc trong geo/map block. Để tiện, đặt ở đây khi dùng include ở http level.
# -----------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=api_limit:20m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:5m rate=50r/s;
limit_req_zone $binary_remote_addr zone=global_limit:20m rate=30r/s;

# Log format với request ID để trace
log_format prodiab_main '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct=$upstream_connect_time '
                        'uht=$upstream_header_time urt=$upstream_response_time '
                        'rid=$http_x_request_id';

# -----------------------------------------------------------------------
# Geo block cho bad bots / known scanners (IP list mẫu — cập nhật định kỳ)
# -----------------------------------------------------------------------
geo $block_bad_actor {
    default         0;
    # Tor exit nodes, known scanners — cập nhật từ threat feed
    # 185.220.101.0/24  1;  # Ví dụ: Tor exit node range
    # 45.142.212.0/24   1;  # Ví dụ: scanner botnet
}

# -----------------------------------------------------------------------
# Map: chặn bad bots theo User-Agent
# -----------------------------------------------------------------------
map $http_user_agent $bad_bot {
    default                                     0;
    ""                                          1;    # Empty UA
    ~*"masscan"                                 1;
    ~*"sqlmap"                                  1;
    ~*"nikto"                                   1;
    ~*"nmap"                                    1;
    ~*"zgrab"                                   1;
    ~*"python-requests/2\.[0-9]\."              0;    # Allow legitimate python
    ~*"python-urllib"                           1;
    ~*"go-http-client/1\.1"                     1;    # Generic Go scanner
    ~*"curl/7\.[0-4]"                           0;    # Allow curl
    ~*"scrapy"                                  1;
    ~*"HTTrack"                                 1;
    ~*"harvest"                                 1;
    ~*"extract"                                 1;
    ~*"grab"                                    1;
    ~*"BLEXBot"                                 1;
    ~*"SemrushBot"                              0;    # SEO crawler — allow
    ~*"AhrefsBot"                               0;    # SEO crawler — allow
    ~*"DotBot"                                  1;    # Malicious
    ~*"MJ12bot"                                 1;
    ~*"Xenu"                                    1;
}

# Upstream backends
upstream api_backend {
    server backend:5000;
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream web_backend {
    server frontend:3000;
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# -----------------------------------------------------------------------
# HTTP: redirect tất cả sang HTTPS
# -----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------
# HTTPS: main virtual host (hardened)
# -----------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name *.prodiab.example.com prodiab.example.com;

    # --- SSL ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;                              # Tắt session tickets để tăng bảo mật
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_dhparam         /etc/nginx/certs/dhparam.pem;   # openssl dhparam -out dhparam.pem 4096

    # --- Strict timeouts ---
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;
    keepalive_timeout     15s;
    reset_timedout_connection on;

    # --- Request size limits ---
    client_max_body_size      50M;
    client_body_buffer_size   128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # --- Buffer tuning ---
    proxy_buffering          on;
    proxy_buffer_size        16k;
    proxy_buffers            8 32k;
    proxy_busy_buffers_size  64k;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.donthuocquocgia.vn; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;  # HIS không cần SEO index
    # Ẩn server header (cần nginx build với ngx_headers_more)
    # more_set_headers "Server: ProDiab";

    # Log format
    access_log /var/log/nginx/access.log prodiab_main;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------------
    # Block bad bots và bad actors
    # -----------------------------------------------------------------------
    if ($bad_bot)       { return 444; }
    if ($block_bad_actor) { return 444; }

    # Block requests không có Host header hợp lệ
    if ($host = "") { return 444; }

    # -----------------------------------------------------------------------
    # Login endpoint — rate limit nghiêm ngặt: 1 req/s per IP, burst 5
    # -----------------------------------------------------------------------
    location = /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout  5s;
        proxy_read_timeout     15s;
        proxy_send_timeout     10s;
    }

    # Login refresh token — cũng rate limit
    location = /api/v1/auth/refresh {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout  5s;
        proxy_read_timeout     10s;
        proxy_send_timeout     10s;
    }

    # -----------------------------------------------------------------------
    # API chung: 10 req/s per IP, burst 20
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_set_header X-Request-Id $request_id;

        # Timeouts strict cho API
        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;    # Long poll endpoints cần thời gian
        proxy_send_timeout     30s;

        # Không cache API response
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # -----------------------------------------------------------------------
    # Health check — không rate limit, không log
    # -----------------------------------------------------------------------
    location = /healthz {
        proxy_pass http://api_backend/healthz;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 5s;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Readiness probe endpoint — mở rộng hơn cho load balancer
    location = /ready {
        proxy_pass http://api_backend/ready;
        proxy_read_timeout 5s;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # MinIO presigned URLs (file download CLS, PDF đơn thuốc)
    # -----------------------------------------------------------------------
    location /storage/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://minio:9000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;

        proxy_connect_timeout  5s;
        proxy_read_timeout     120s;   # Upload file lớn
        proxy_send_timeout     120s;
    }

    # -----------------------------------------------------------------------
    # Static assets Next.js — cache aggressive, rate limit cao
    # -----------------------------------------------------------------------
    location /_next/static/ {
        limit_req zone=static_limit burst=100 nodelay;

        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    # Favicon và robots
    location = /favicon.ico {
        proxy_pass http://web_backend;
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /robots.txt {
        proxy_pass http://web_backend;
        access_log off;
        log_not_found off;
    }

    # -----------------------------------------------------------------------
    # Frontend Next.js — tất cả route còn lại
    # -----------------------------------------------------------------------
    location / {
        limit_req zone=global_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;
        proxy_send_timeout     15s;
    }

    # -----------------------------------------------------------------------
    # Block truy cập file nhạy cảm
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|svn|bak|sql|log|conf|ini|sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block phpMyAdmin, wp-admin và các scanner phổ biến
    location ~* ^/(phpmyadmin|wp-admin|wp-login|xmlrpc|admin\.php|shell\.php|backdoor\.php) {
        return 444;
    }

    # -----------------------------------------------------------------------
    # Custom error pages
    # -----------------------------------------------------------------------
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;

    location = /429.html {
        internal;
        return 429 '{"error":{"code":"RATE_LIMIT_EXCEEDED","message":"Too many requests. Please try again later."}}';
        add_header Content-Type application/json always;
    }

    location = /50x.html {
        internal;
        proxy_pass http://web_backend/500;
    }
}
