openapi: 3.1.0
info:
  title: Pro-Diab HIS - Payments API
  version: 1.0.0-sprint8
  description: |
    Thanh toán đa kênh: CASH, BANK_TRANSFER, VISA/MASTER, QR (VietQR/MoMo/VNPay).
    IPaymentGateway abstraction. Webhook signature verification.
servers:
  - url: /api/v1

tags:
  - name: Payments
  - name: PaymentQR
  - name: PaymentCard
  - name: PaymentWebhook

paths:
  /payments:
    get:
      tags: [Payments]
      security: [{ bearerAuth: [payment.read] }]
      parameters:
        - { name: billing_id, in: query, schema: { type: string, format: uuid } }
        - { name: method, in: query, schema: { $ref: '#/components/schemas/PaymentMethod' } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/PaymentStatus' } }
        - { name: from_date, in: query, schema: { type: string, format: date } }
        - { name: to_date, in: query, schema: { type: string, format: date } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/PaymentResponse' } }
                  meta: { $ref: '#/components/schemas/PageMeta' }

    post:
      tags: [Payments]
      summary: Record payment (CASH/transfer/manual). Ghi nợ nếu thiếu.
      security: [{ bearerAuth: [payment.collect] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [billing_id, amount, method]
              properties:
                billing_id: { type: string, format: uuid }
                amount: { type: number, minimum: 0 }
                method: { $ref: '#/components/schemas/PaymentMethod' }
                reference: { type: string, description: 'Mã giao dịch ngân hàng / sao kê' }
                provider: { type: string, nullable: true }
                provider_txn_id: { type: string, nullable: true }
                note: { type: string }
      responses:
        '201': { $ref: '#/components/responses/PaymentOk' }
        '400':
          description: PAYMENT_AMOUNT_INVALID
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }

  /payments/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Payments]
      security: [{ bearerAuth: [payment.read] }]
      responses: { '200': { $ref: '#/components/responses/PaymentOk' } }

  /payments/{id}/refund:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Payments]
      security: [{ bearerAuth: [payment.refund] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, reason]
              properties:
                amount: { type: number, minimum: 0.01 }
                reason: { type: string, minLength: 5 }
      responses: { '200': { $ref: '#/components/responses/PaymentOk' } }

  /payments/{id}/void:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Payments]
      security: [{ bearerAuth: [payment.void] }]
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { reason: { type: string } } }
      responses: { '200': { $ref: '#/components/responses/PaymentOk' } }

  /payments/methods:
    get:
      tags: [Payments]
      security: [{ bearerAuth: [payment.read] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        method: { $ref: '#/components/schemas/PaymentMethod' }
                        is_active: { type: boolean }
                        provider: { type: string, nullable: true }
                        config: { type: object }

  /payments/qr/generate:
    post:
      tags: [PaymentQR]
      summary: Generate dynamic QR for a billing
      security: [{ bearerAuth: [payment_qr.generate] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [billing_id, provider, amount]
              properties:
                billing_id: { type: string, format: uuid }
                provider: { type: string, enum: [VIETQR, MOMO, VNPAY] }
                amount: { type: number, minimum: 1000 }
                expires_in_seconds: { type: integer, default: 900 }
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/QrCodeResponse' }

  /payments/qr/{qrId}/status:
    parameters:
      - { name: qrId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [PaymentQR]
      summary: Poll status (frontend long-poll or interval 3s)
      security: [{ bearerAuth: [payment.read] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/QrCodeResponse' }
        '410':
          description: PAYMENT_QR_EXPIRED

  /payments/qr/webhook/{provider}:
    parameters:
      - { name: provider, in: path, required: true, schema: { type: string, enum: [vietqr, momo, vnpay] } }
    post:
      tags: [PaymentWebhook]
      summary: PUBLIC callback from provider. Verify signature.
      description: |
        Header: X-Signature (HMAC). Body schema theo provider.
        Idempotent qua provider_txn_id.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200': { description: ACK }
        '401': { description: Invalid signature }

  /payments/card/charge:
    post:
      tags: [PaymentCard]
      summary: Charge Visa/Master via gateway (tokenized)
      security: [{ bearerAuth: [payment.collect] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [billing_id, amount, card_token]
              properties:
                billing_id: { type: string, format: uuid }
                amount: { type: number }
                card_token: { type: string, description: 'Token từ gateway (Stripe-like), KHÔNG nhận PAN' }
                provider: { type: string, enum: [VISA, MASTER], default: VISA }
                three_ds_nonce: { type: string, nullable: true }
      responses:
        '200': { $ref: '#/components/responses/PaymentOk' }
        '402':
          description: PAYMENT_GATEWAY_ERROR
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  schemas:
    PaymentMethod:
      type: string
      enum: [CASH, BANK_TRANSFER, VISA, MASTER, QR_VIETQR, QR_MOMO, QR_VNPAY, OTHER]

    PaymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REFUNDED, VOID]

    PaymentResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        billing_id: { type: string, format: uuid }
        amount: { type: number, description: 'DECIMAL(15,2)' }
        method: { $ref: '#/components/schemas/PaymentMethod' }
        reference: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        provider: { type: string, nullable: true }
        provider_txn_id: { type: string, nullable: true }
        paid_at: { type: string, format: date-time, nullable: true }
        paid_by: { type: string, format: uuid, nullable: true }
        cashier_shift_id: { type: string, format: uuid, nullable: true }
        note: { type: string, nullable: true }
        refunded_amount: { type: number, default: 0 }
        created_at: { type: string, format: date-time }

    QrCodeResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        billing_id: { type: string, format: uuid }
        provider: { type: string, enum: [VIETQR, MOMO, VNPAY] }
        qr_payload: { type: string, description: 'base64 PNG' }
        qr_url: { type: string, description: 'Deep link mở app ngân hàng' }
        amount: { type: number }
        expires_at: { type: string, format: date-time }
        paid_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [PENDING, PAID, EXPIRED, CANCELLED] }
        transaction_ref: { type: string, description: 'Nội dung chuyển khoản unique' }

    PageMeta:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }

  responses:
    PaymentOk:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/PaymentResponse' }
